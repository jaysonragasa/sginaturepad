<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smooth Signature Pad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevent scrolling when touching the canvas on mobile */
        #signature-pad {
            touch-action: none; 
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Digital Signature</h1>
            <p class="text-gray-500 text-sm mt-1">Features stroke smoothing & realistic ink.</p>
        </div>

        <!-- Canvas Container -->
        <div class="relative border-2 border-dashed border-gray-300 rounded-xl bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxwYXRoIGQ9Ik0wIDIwaDIwdjFIMHptMjAtMjBoMXYyMGgtMXoiIGZpbGw9IiNlNWU3ZWIiIGZpbGwtb3BhY2l0eT0iMC40IiBmaWxsLXJ1bGU9ImV2ZW5vZGQiLz4KPC9zdmc+')] bg-gray-50 overflow-hidden touch-none flex justify-center items-center">
            
            <canvas id="signature-pad" class="cursor-crosshair w-full max-w-full" width="600" height="300"></canvas>
            
            <div id="placeholder" class="absolute inset-0 flex items-center justify-center pointer-events-none text-gray-300 select-none">
                <span class="text-xl font-medium tracking-widest">SIGN HERE</span>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="mt-6 flex flex-col md:flex-row gap-4 justify-between items-center">
            <!-- Color Selection -->
            <div class="flex gap-2 items-center w-full md:w-auto justify-center md:justify-start mb-2 md:mb-0">
                <span class="text-sm font-medium text-gray-600 mr-2">Pen Color:</span>
                <button class="color-btn w-8 h-8 rounded-full bg-black ring-2 ring-offset-2 ring-black transition-all" data-color="#000000" aria-label="Black pen"></button>
                <button class="color-btn w-8 h-8 rounded-full bg-blue-600 ring-2 ring-offset-2 ring-transparent transition-all" data-color="#2563eb" aria-label="Blue pen"></button>
                <button class="color-btn w-8 h-8 rounded-full bg-red-600 ring-2 ring-offset-2 ring-transparent transition-all" data-color="#dc2626" aria-label="Red pen"></button>
            </div>

            <!-- Actions -->
            <div class="flex flex-wrap gap-2 w-full md:w-auto justify-center">
                <button id="clear-btn" class="flex-1 md:flex-none px-4 py-2.5 rounded-lg text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors border border-gray-200">
                    Clear
                </button>
                <button id="save-btn" class="flex-1 md:flex-none px-4 py-2.5 rounded-lg text-sm font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 transition-colors border border-blue-200">
                    Save PNG (Transparent)
                </button>
                <button id="save-jpg-btn" class="w-full sm:flex-1 md:flex-none px-4 py-2.5 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-sm shadow-blue-600/30">
                    Save JPG (White BG)
                </button>
            </div>
        </div>
        <p class="text-xs text-center text-gray-400 mt-4">Use "Save JPG" if sending via Messenger or WhatsApp to prevent black backgrounds.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('signature-pad');
            const ctx = canvas.getContext('2d', { alpha: true });
            const clearBtn = document.getElementById('clear-btn');
            const saveBtn = document.getElementById('save-btn');
            const saveJpgBtn = document.getElementById('save-jpg-btn');
            const colorBtns = document.querySelectorAll('.color-btn');
            const placeholder = document.getElementById('placeholder');
            
            // Advanced Clear: Forces pixels to transparent white instead of transparent black
            // This prevents specific mobile encoders from turning transparent pixels solid black.
            function clearSignaturePad() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = 255;     // Red
                    data[i + 1] = 255; // Green
                    data[i + 2] = 255; // Blue
                    data[i + 3] = 0;   // Alpha (Transparent)
                }
                ctx.putImageData(imgData, 0, 0);
            }

            // Initialize canvas
            clearSignaturePad();
            
            let isDrawing = false;
            let hasDrawn = false;
            let penColor = '#000000';

            // Pen Configuration
            const minWidth = 1.0;
            const maxWidth = 5.0;
            const velocityFilterWeight = 0.5;
            
            // State tracking for smooth ink
            let points = [];
            let lastVelocity = 0;
            let lastWidth = (minWidth + maxWidth) / 2;
            let lastMidPoint = null;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Function to get exact coordinates
            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
                const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY,
                    time: Date.now()
                };
            }

            // Start drawing
            function startDrawing(e) {
                e.preventDefault(); 
                isDrawing = true;
                
                if (!hasDrawn) {
                    placeholder.style.display = 'none';
                    hasDrawn = true;
                }

                const point = getCoordinates(e);
                points = [point];
                lastVelocity = 0;
                lastWidth = (minWidth + maxWidth) / 2;
                lastMidPoint = point;

                // Draw initial dot
                ctx.fillStyle = penColor;
                ctx.beginPath();
                ctx.arc(point.x, point.y, lastWidth / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            }

            // Draw line
            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                
                const point = getCoordinates(e);
                points.push(point);

                if (points.length >= 2) {
                    const p1 = points[points.length - 2];
                    const p2 = points[points.length - 1];

                    const midPoint = {
                        x: (p1.x + p2.x) / 2,
                        y: (p1.y + p2.y) / 2
                    };

                    const distance = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                    const timeDiff = p2.time - p1.time;
                    let velocity = timeDiff === 0 ? 0 : distance / timeDiff;

                    velocity = velocityFilterWeight * velocity + (1 - velocityFilterWeight) * lastVelocity;

                    let targetWidth = Math.max(minWidth, maxWidth - (velocity * 1.5));
                    let currentWidth = lastWidth * 0.7 + targetWidth * 0.3;

                    ctx.beginPath();
                    ctx.moveTo(lastMidPoint.x, lastMidPoint.y);
                    ctx.quadraticCurveTo(p1.x, p1.y, midPoint.x, midPoint.y);
                    
                    ctx.strokeStyle = penColor;
                    ctx.lineWidth = currentWidth;
                    ctx.stroke();

                    lastVelocity = velocity;
                    lastWidth = currentWidth;
                    lastMidPoint = midPoint;
                }
            }

            // Stop drawing
            function stopDrawing() {
                if (!isDrawing) return;
                isDrawing = false;
                
                if (points.length >= 2) {
                    const lastPoint = points[points.length - 1];
                    ctx.beginPath();
                    ctx.moveTo(lastMidPoint.x, lastMidPoint.y);
                    ctx.lineTo(lastPoint.x, lastPoint.y);
                    ctx.strokeStyle = penColor;
                    ctx.lineWidth = lastWidth;
                    ctx.stroke();
                }

                points = [];
                lastMidPoint = null;
            }

            // Mouse Events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);
            
            // Touch Events
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            window.addEventListener('touchend', stopDrawing);
            window.addEventListener('touchcancel', stopDrawing);

            // Clear Canvas
            clearBtn.addEventListener('click', () => {
                clearSignaturePad();
                hasDrawn = false;
                placeholder.style.display = 'flex';
            });

            // Change Pen Color
            colorBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    penColor = e.target.dataset.color;
                    
                    colorBtns.forEach(b => {
                        b.classList.remove(`ring-${b.dataset.color === '#000000' ? 'black' : (b.dataset.color === '#2563eb' ? 'blue-600' : 'red-600')}`);
                        b.classList.add('ring-transparent');
                    });
                    
                    const ringColorClass = penColor === '#000000' ? 'ring-black' : (penColor === '#2563eb' ? 'ring-blue-600' : 'ring-red-600');
                    e.target.classList.remove('ring-transparent');
                    e.target.classList.add(ringColorClass);
                });
            });

            // Save Canvas as Transparent PNG
            saveBtn.addEventListener('click', () => {
                if (!hasDrawn) return;
                canvas.toBlob((blob) => {
                    if (!blob) return;
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `signature-transparent-${new Date().getTime()}.png`;
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                }, 'image/png');
            });

            // Save Canvas as JPG with White Background (For Messenger/WhatsApp)
            saveJpgBtn.addEventListener('click', () => {
                if (!hasDrawn) return;
                
                // Create a temporary canvas
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tCtx = tempCanvas.getContext('2d');
                
                // Fill the background with solid white
                tCtx.fillStyle = '#ffffff';
                tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                
                // Draw the signature over the white background
                tCtx.drawImage(canvas, 0, 0);
                
                // Export as JPEG
                tempCanvas.toBlob((blob) => {
                    if (!blob) return;
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `signature-whiteBG-${new Date().getTime()}.jpg`;
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                }, 'image/jpeg', 1.0); // 1.0 is highest quality
            });
        });
    </script>
</body>
</html>
